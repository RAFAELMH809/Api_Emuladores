syntax = "proto3";

package safeair;

message TelemetryPayload {
  string emulatorId = 1;
  string roomId = 2;
  float temperature = 3;
  float humidity = 4;
  float co2 = 5;
  float pm25 = 6;
  string timestamp = 7;
}

message ActuatorStatePayload {
  string emulatorId = 1;
  string roomId = 2;
  string deviceType = 3; // minisplit | purifier | extractor
  bool isOn = 4;
  string mode = 5;
  float targetTemperature = 6;
  float ambientTemperature = 7;
  float ambientHumidity = 8;
  string timestamp = 9;
}
